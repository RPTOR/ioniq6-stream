<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>IONIQ6 Dashcam</title>
  <script src="https://cdn.jsdelivr.net/npm/hls.js@1.5.7"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #0d0d0d; color: #fff; font-family: 'Segoe UI', system-ui, sans-serif; min-height: 100vh; }

    /* ── Top navbar ── */
    #navbar {
      display: flex; align-items: center;
      background: #1a1a1a; border-bottom: 1px solid #2a2a2a;
      padding: 0 16px; height: 52px; flex-shrink: 0;
      position: sticky; top: 0; z-index: 10;
    }
    #navbar h1 { font-size: 1rem; color: #4fc3f7; white-space: nowrap; margin-right: 24px; }
    #tabs { display: flex; gap: 4px; flex: 1; }
    .tab-btn {
      background: transparent; color: #777; border: none;
      padding: 8px 16px; border-radius: 6px 6px 0 0;
      cursor: pointer; font-size: 0.88rem; transition: background 0.15s, color 0.15s;
      display: flex; align-items: center; gap: 6px;
    }
    .tab-btn:hover { background: #252525; color: #ccc; }
    .tab-btn.active { background: #4fc3f7; color: #000; font-weight: 600; }

    #content { padding: 14px; }
    .panel { display: none; }
    .panel.active { display: block; }

    /* ── Stream ── */
    #video { border: 1px solid #333; border-radius: 8px; width: 100%; background: #000; aspect-ratio: 16/9; display: block; }
    #controls { margin-top: 10px; display: flex; gap: 8px; flex-wrap: wrap; justify-content: center; }
    button { background: #4fc3f7; color: #000; border: none; padding: 7px 14px; border-radius: 6px; cursor: pointer; font-size: 0.85rem; }
    button:hover { background: #81d4fa; }
    button.snapshot { background: #ff8a65; }
    button.snapshot:hover { background: #ffab91; }
    #status { margin-top: 8px; font-size: 0.8rem; color: #777; text-align: center; }
    #canvas { display: none; }

    /* Browse layout */
    #panel-browse.active { display: flex; flex-direction: column; }

    /* Viewer strip */
    #viewer { display: none; }
      border: 1px solid #333; border-radius: 8px; overflow: hidden;
      background: #000; margin-bottom: 12px;
      min-height: 260px;
    }
    #viewer.empty { display: flex; align-items: center; justify-content: center; color: #444; font-size: 0.85rem; }
    #viewer-media { display: flex; align-items: center; justify-content: center; height: 220px; }
    #viewer-media img, #viewer-media video { max-width: 100%; max-height: 100%; object-fit: contain; display: block; }
    #viewer-name { padding: 6px 10px; font-size: 0.78rem; color: #888; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; background: #111; }
    #viewer-controls { display: none; }

    /* File list */
    #browser { background: #111; border-radius: 8px; overflow: hidden; }
    #browser-header { display: flex; align-items: center; gap: 6px; padding: 9px; background: #1a1a1a; flex-wrap: wrap; }
    #browser-path { color: #aaa; font-size: 0.8rem; font-family: monospace; flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    #file-list { max-height: calc(100vh - 400px); overflow-y: auto; }
    .file-row {
      display: flex; align-items: center; gap: 8px;
      padding: 9px 12px; border-bottom: 1px solid #1c1c1c;
      cursor: pointer; transition: background 0.1s;
    }
    .file-row:hover { background: #1e1e1e; }
    .file-row.selected { background: #1b3a4b; }
    .file-row.folder { color: #4fc3f7; }
    .file-row .finfo { flex: 1; min-width: 0; overflow: hidden; }
    .file-row .fname { font-size: 0.85rem; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .file-row .fmeta { display: flex; gap: 12px; font-size: 0.72rem; color: #555; margin-top: 1px; }
    .file-row .fsize { white-space: nowrap; }
    .file-row .ftime { white-space: nowrap; }
    .dl-btn {
      background: #3a3a3a; color: #aaa; border: none;
      padding: 4px 10px; border-radius: 4px; cursor: pointer;
      font-size: 0.75rem; flex-shrink: 0; text-decoration: none;
      display: inline-block;
    }
    .dl-btn:hover { background: #4fc3f7; color: #000; }
    .del-btn {
      background: #3a3a3a; color: #aaa; border: none;
      padding: 4px 8px; border-radius: 4px; cursor: pointer;
      font-size: 0.75rem; flex-shrink: 0;
    }
    .del-btn:hover { background: #f55; color: #fff; }
  </style>
</head>
<body>

  <div id="navbar">
    <h1>🚗 IONIQ6 — VIOFO A139 PRO</h1>
    <div id="tabs">
      <button class="tab-btn active" id="tab-stream" onclick="showTab('stream')">📹 Live Stream</button>
      <button class="tab-btn" id="tab-browse" onclick="showTab('browse')">📁 Browse Files</button>
    </div>
  </div>

  <div id="content">

    <!-- Live Stream -->
    <div id="panel-stream" class="panel active">
      <video id="video" autoplay playsinline controls></video>
      <div id="controls">
        <button onclick="initStream()">▶ Connect</button>
        <button onclick="takeSnapshot()">📸 Snapshot</button>
      </div>
      <div id="status">Click Connect to start streaming</div>
      <canvas id="canvas"></canvas>
      <div style="margin-top:10px;display:flex;gap:10px;flex-wrap:wrap;align-items:center">
        <span style="color:#888;font-size:0.75rem">Direct links:</span>
        <a href="http://100.127.189.53:8080/stream.m3u8" style="background:#1155cc;color:#fff; padding:4px 10px;border-radius:4px;font-size:0.75rem;text-decoration:none">🔴 HLS</a>
        <a href="rtsp://100.127.189.53:5544/live" style="background:#166534;color:#fff; padding:4px 10px;border-radius:4px;font-size:0.75rem;text-decoration:none">📹 RTSP</a>
      </div>
    </div>

    <!-- Browse Files -->
    <div id="panel-browse" class="panel">

      <!-- File list -->
      <div id="browser">
        <div id="browser-header">
          <button class="btn-sm" onclick="navigateUp()">⬆</button>
          <button class="btn-sm" onclick="loadFolder('/DCIM')">🏠</button>
          <span id="browser-path">/DCIM</span>
        </div>
        <div id="file-list">Click "Browse Files" tab to load</div>
      </div>

    </div>
  </div>

  <script>
    const video     = document.getElementById('video');
    const canvas    = document.getElementById('canvas');
    const status    = document.getElementById('status');
    const CAM_PROXY = '/cam';
    let hls = null;
    let currentPath = '/DCIM';
    let currentHls = null;

    function showTab(name) {
      if (currentHls) { currentHls.destroy(); currentHls = null; }
      document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
      document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
      document.getElementById('tab-' + name).classList.add('active');
      document.getElementById('panel-' + name).classList.add('active');
      if (name === 'browse') loadFolder(currentPath);
    }

    function initStream() {
      if (currentHls) { currentHls.destroy(); currentHls = null; }
      status.textContent = 'Starting stream...';
      const m3u8Url = `http://${location.host}/stream.m3u8?_=${Date.now()}`;
      if (Hls.isSupported()) {
        currentHls = new Hls({ startLevel: -1, debug: false });
        currentHls.loadSource(m3u8Url);
        currentHls.attachMedia(video);
        currentHls.on(Hls.Events.MANIFEST_PARSED, () => { video.play().catch(()=>{}); status.textContent = 'Live streaming'; });
        currentHls.on(Hls.Events.ERROR, (e, d) => { if (d.fatal) status.textContent = 'Stream error: ' + d.type; });
      } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
        video.src = m3u8Url; video.play().catch(()=>{}); status.textContent = 'Live streaming (native HLS)';
      } else { status.textContent = 'HLS not supported'; }
    }

    function takeSnapshot() {
      if (!video.src && !video.currentSrc) { alert('Connect to stream first!'); return; }
      canvas.width = video.videoWidth || 1920; canvas.height = video.videoHeight || 1080;
      canvas.getContext('2d').drawImage(video, 0, 0);
      canvas.toBlob(blob => { const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = 'snapshot-' + Date.now() + '.jpg'; a.click(); });
    }

    async function loadFolder(path) {
      const list  = document.getElementById('file-list');
      const pathEl = document.getElementById('browser-path');
      currentPath = path;
      pathEl.textContent = path || '/';
      list.innerHTML = '<div style="color:#888;padding:14px;font-size:0.85rem">Loading...</div>';
      try {
        const r    = await fetch(CAM_PROXY + path);
        const html = await r.text();
        const rows = parseFileList(html);
        if (!rows.length) {
          list.innerHTML = '<div style="color:#888;padding:14px;font-size:0.85rem">Empty or inaccessible</div>';
          return;
        }
        list.innerHTML = rows.map((row, i) => `
          <div class="file-row ${row.type}">
            ${row.type === 'folder'
              ? `<span class="finfo" style="cursor:pointer" onclick="loadFolder('${row.href}')">
                   <div class="fname">📁 ${row.name}</div>
                   <div class="fmeta"><span class="fsize">${row.size}</span><span class="ftime">${row.time}</span></div>
                 </span>`
              : row.name.match(/\.(jpg|jpeg|png)$/i)
                ? `<a class="finfo" href="${CAM_PROXY}${row.href}" download="${row.name}" style="cursor:pointer;text-decoration:none;color:inherit">
                     <div class="fname">🎬 ${row.name}</div>
                     <div class="fmeta"><span class="fsize">${row.size}</span><span class="ftime">${row.time}</span></div>
                   </a>`
                : `<a class="finfo" href="${CAM_PROXY}${row.href}?download=1" download="${row.name}" style="cursor:pointer;text-decoration:none;color:inherit">
                     <div class="fname">🎬 ${row.name}</div>
                     <div class="fmeta"><span class="fsize">${row.size}</span><span class="ftime">${row.time}</span></div>
                   </a>`}
            ${row.type !== 'folder' ? `<a class="dl-btn" href="${CAM_PROXY}${row.href}" download="${row.name}" onclick="event.stopPropagation()">⬇</a>` : ''}
          </div>`
        ).join('');
        // store rows for indexed access

      } catch(e) {
        list.innerHTML = `<div style="color:#f55;padding:14px;font-size:0.85rem">Error: ${e.message}<br><small>Check dashcam WiFi connection</small></div>`;
      }
    }

    function parseFileList(html) {
      const rows = [];
      for (const raw of html.split('<tr>')) {
        if (!raw || !raw.includes('<a href=')) continue;
        const hrefM = raw.match(/<a href="([^"]+)"><b>([^<]+)<\/b><\/a>/);
        if (!hrefM) continue;
        const name = hrefM[2];
        const vals = [...raw.matchAll(/>([^<]+)</g)].map(m => m[1].trim());
        const isFolder = vals.length >= 2 && vals[1] === 'folder';
        rows.push({ type: isFolder ? 'folder' : 'file', name, href: hrefM[1], size: vals[1] || '', time: vals[2] || '' });
      }
      return rows;
    }

    function navigateUp() {
      if (!currentPath || currentPath === '/') return;
      const parts = currentPath.split('/').filter(Boolean);
      parts.pop();
      loadFolder('/' + parts.join('/'));
    }


  </script>
</body>
</html>
