<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>IONIQ6 Dashcam</title>
  <script src="https://cdn.jsdelivr.net/npm/hls.js@1.5.7"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #0d0d0d; color: #fff; font-family: 'Segoe UI', system-ui, sans-serif; display: flex; flex-direction: column; align-items: center; padding: 20px; }
    h1 { font-size: 1.2rem; margin-bottom: 12px; color: #4fc3f7; }
    #video { border: 1px solid #333; border-radius: 8px; width: 100%; max-width: 960px; background: #000; }
    #controls { margin-top: 12px; display: flex; gap: 10px; flex-wrap: wrap; justify-content: center; }
    button { background: #4fc3f7; color: #000; border: none; padding: 8px 16px; border-radius: 6px; cursor: pointer; font-size: 0.9rem; }
    button:hover { background: #81d4fa; }
    button.snapshot { background: #ff8a65; }
    button.snapshot:hover { background: #ffab91; }
    button.browse { background: #66bb6a; }
    button.browse:hover { background: #81c784; }
    button.active { background: #388e3c; color: #fff; }
    #status { margin-top: 10px; font-size: 0.85rem; color: #888; }
    #canvas { display: none; }
    #browser { margin-top: 20px; width: 100%; max-width: 960px; display: none; }
    #browser.visible { display: block; }
    #browser-header { display: flex; align-items: center; gap: 8px; margin-bottom: 10px; flex-wrap: wrap; }
    #browser-path { color: #aaa; font-size: 0.85rem; font-family: monospace; }
    #file-list { background: #111; border-radius: 8px; padding: 10px; max-height: 300px; overflow-y: auto; }
    .file-row { display: flex; justify-content: space-between; padding: 6px 8px; border-radius: 4px; cursor: pointer; align-items: center; }
    .file-row:hover { background: #222; }
    .file-row.folder { color: #4fc3f7; }
    .file-row .fname { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .file-row .fsize { color: #888; font-size: 0.8rem; margin-left: 12px; white-space: nowrap; }
    .file-row .ftime { color: #666; font-size: 0.75rem; margin-left: 12px; white-space: nowrap; }
  </style>
</head>
<body>
  <h1>🚗 IONIQ6 Dashcam — VIOFO A139 PRO</h1>
  <video id="video" autoplay playsinline controls></video>
  <div id="controls">
    <button onclick="initStream()">▶ Connect</button>
    <button onclick="takeSnapshot()">📸 Snapshot</button>
    <button class="browse" id="browseBtn" onclick="toggleBrowser()">📁 File Browser</button>
  </div>
  <div id="status">Click Connect to start streaming</div>
  <canvas id="canvas"></canvas>

  <div id="browser">
    <div id="browser-header">
      <button onclick="navigateUp()">⬆ Up</button>
      <button onclick="loadFolder('/DCIM')">🏠 Home</button>
      <span id="browser-path">/DCIM</span>
    </div>
    <div id="file-list">Click "File Browser" to browse camera files</div>
  </div>

  <script>
    const video   = document.getElementById('video');
    const canvas  = document.getElementById('canvas');
    const status  = document.getElementById('status');
    const browseBtn = document.getElementById('browseBtn');
    const CAM_PROXY = '/cam';
    let hls = null;
    let browserOpen = false;
    let currentPath = '/DCIM';

    function initStream() {
      if (hls) { hls.destroy(); hls = null; }
      status.textContent = 'Starting stream...';
      const m3u8Url = `http://${location.host}/stream.m3u8?_=${Date.now()}`;
      if (Hls.isSupported()) {
        hls = new Hls({ startLevel: -1, debug: false });
        hls.loadSource(m3u8Url);
        hls.attachMedia(video);
        hls.on(Hls.Events.MANIFEST_PARSED, () => { video.play().catch(()=>{}); status.textContent = 'Live streaming'; });
        hls.on(Hls.Events.ERROR, (e, d) => { if (d.fatal) status.textContent = 'Stream error: ' + d.type; });
      } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
        video.src = m3u8Url; video.play().catch(()=>{}); status.textContent = 'Live streaming (native HLS)';
      } else { status.textContent = 'HLS not supported'; }
    }

    function takeSnapshot() {
      if (!video.src) { alert('Not connected!'); return; }
      canvas.width = video.videoWidth; canvas.height = video.videoHeight;
      canvas.getContext('2d').drawImage(video, 0, 0);
      canvas.toBlob(blob => { const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = 'snapshot-' + Date.now() + '.jpg'; a.click(); });
    }

    function toggleBrowser() {
      browserOpen = !browserOpen;
      const el = document.getElementById('browser');
      el.classList.toggle('visible', browserOpen);
      browseBtn.classList.toggle('active', browserOpen);
      if (browserOpen) loadFolder(currentPath);
    }

    async function loadFolder(path) {
      const list = document.getElementById('file-list');
      const pathEl = document.getElementById('browser-path');
      currentPath = path;
      pathEl.textContent = path || '/';
      list.innerHTML = 'Loading...';
      try {
        const r = await fetch(CAM_PROXY + path);
        const html = await r.text();
        const rows = parseFileList(html, path);
        if (rows.length === 0) {
          list.innerHTML = '<div style="color:#888;padding:10px">Empty or inaccessible</div>';
          return;
        }
        list.innerHTML = rows.map(row =>
          `<div class="file-row ${row.type}" ${row.type === 'folder' ? `onclick="loadFolder('${row.href}')"` : `onclick="playFile('${row.href}','${row.name}')"`}>
            <span class="fname">${row.type === 'folder' ? '📁 ' : '🎬 '}${row.name}</span>
            <span class="fsize">${row.size}</span>
            <span class="ftime">${row.time}</span>
           </div>`
        ).join('');
      } catch(e) {
        list.innerHTML = `<div style="color:#f55;padding:10px">Error: ${e.message}<br><small>Make sure you are connected to the dashcam WiFi</small></div>`;
      }
    }

    function parseFileList(html, basePath) {
      const rows = [];
      // Camera HTML has NO </tr> closing tags — each row is: <tr>...<next <tr> or end of table
      // Format: <tr><td><a href="PATH"><b>NAME</b></a><td align=...><i>folder</i> or SIZE<td align=right>DATE
      // We split on <tr> boundaries and parse each row individually
      const rowTexts = html.split('<tr>');
      for (const raw of rowTexts) {
        if (!raw.includes('<a href=')) continue;

        // href and name: <td><a href="PATH"><b>NAME</b></a>
        const hrefMatch = raw.match(/<a href="([^"]+)"><b>([^<]+)<\/b><\/a>/);
        if (!hrefMatch) continue;
        const href = hrefMatch[1];
        const name = hrefMatch[2];

        // Determine if folder: row contains <i>folder</i>
        const isFolder = raw.includes('>folder<') || raw.includes('>folder<');

        // Size: after href block, find the next <td...>...<td align=right>DATE
        // The size is either "folder" text or numeric like "24.56 MB"
        let size = '';
        if (isFolder) {
          size = 'folder';
        } else {
          // Size appears as text in a <td> (not align=right one, which is the date)
          // e.g. <td align=right> 24.56 MB
          const sizeMatch = raw.match(/<td[^>]*>\s*([\d.]+\s*[KMG]?B)\s*<\/td>/i);
          if (sizeMatch) size = sizeMatch[1].trim();
        }

        // Date/time: <td align=right>2026/04/15 20:15:45
        const dateMatch = raw.match(/<td[^>]*align=right[^>]*>([\d\/:\s]+)<\/td>/);
        const time = dateMatch ? dateMatch[1].trim() : '';

        // Resolve relative paths
        let fullHref = href;
        if (!href.startsWith('/')) {
          const base = basePath.replace(/[^/]*$/, '');
          fullHref = base + href;
        }

        rows.push({ type: isFolder ? 'folder' : 'file', name, href: fullHref, size, time });
      }
      return rows;
    }

    function navigateUp() {
      if (!currentPath || currentPath === '/') return;
      const parts = currentPath.split('/').filter(Boolean);
      parts.pop();
      loadFolder('/' + parts.join('/'));
    }

    function playFile(href, name) {
      const url = CAM_PROXY + href;
      if (hls) { hls.destroy(); hls = null; }
      video.src = url;
      video.play().catch(()=>{});
      status.textContent = '▶ Playing: ' + name;
    }
  </script>
</body>
</html>
