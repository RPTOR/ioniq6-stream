<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>IONIQ6 Dashcam</title>
  <script src="https://cdn.jsdelivr.net/npm/hls.js@1.5.7"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #0d0d0d; color: #fff; font-family: 'Segoe UI', system-ui, sans-serif; display: flex; flex-direction: column; align-items: center; padding: 20px; }
    h1 { font-size: 1.2rem; margin-bottom: 12px; color: #4fc3f7; }
    #wrap { display: flex; gap: 16px; width: 100%; max-width: 1400px; align-items: flex-start; }
    #left { flex: 1; min-width: 0; }
    #right { width: 300px; flex-shrink: 0; }
    #video { border: 1px solid #333; border-radius: 8px; width: 100%; background: #000; aspect-ratio: 16/9; display: block; }
    #controls { margin-top: 12px; display: flex; gap: 10px; flex-wrap: wrap; justify-content: center; }
    button { background: #4fc3f7; color: #000; border: none; padding: 8px 16px; border-radius: 6px; cursor: pointer; font-size: 0.9rem; }
    button:hover { background: #81d4fa; }
    button.snapshot { background: #ff8a65; }
    button.snapshot:hover { background: #ffab91; }
    button.browse { background: #66bb6a; }
    button.browse:hover { background: #81c784; }
    button.active { background: #388e3c; color: #fff; }
    #status { margin-top: 10px; font-size: 0.85rem; color: #888; }
    #canvas { display: none; }
    #browser { background: #111; border-radius: 8px; overflow: hidden; }
    #browser-header { display: flex; align-items: center; gap: 6px; padding: 10px; background: #1a1a1a; flex-wrap: wrap; }
    #browser-path { color: #aaa; font-size: 0.8rem; font-family: monospace; flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    #file-list { max-height: calc(100vh - 260px); overflow-y: auto; padding: 6px; }
    .file-row { display: flex; justify-content: space-between; padding: 7px 8px; border-radius: 4px; cursor: pointer; align-items: center; }
    .file-row:hover { background: #222; }
    .file-row.folder { color: #4fc3f7; }
    .file-row .fname { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; font-size: 0.85rem; }
    .file-row .fsize { color: #888; font-size: 0.75rem; margin-left: 8px; white-space: nowrap; }
    .file-row .ftime { color: #666; font-size: 0.7rem; margin-left: 8px; white-space: nowrap; }
    #viewer { margin-top: 12px; border: 1px solid #333; border-radius: 8px; overflow: hidden; display: none; background: #000; }
    #viewer video, #viewer img { width: 100%; display: block; }
    #viewer-controls { padding: 8px; background: #111; display: flex; gap: 8px; justify-content: center; }
    #viewer-name { padding: 6px 10px; font-size: 0.8rem; color: #888; text-align: center; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  </style>
</head>
<body>
  <h1>🚗 IONIQ6 Dashcam — VIOFO A139 PRO</h1>

  <div id="wrap">
    <div id="left">
      <video id="video" autoplay playsinline controls></video>
      <div id="controls">
        <button onclick="initStream()">▶ Connect</button>
        <button onclick="takeSnapshot()">📸 Snapshot</button>
        <button class="browse" id="browseBtn" onclick="toggleBrowser()">📁 File Browser</button>
      </div>
      <div id="status">Click Connect to start streaming</div>

      <div id="viewer">
        <div id="viewer-name"></div>
        <div id="viewer-media"></div>
        <div id="viewer-controls">
          <button onclick="closeViewer()">✕ Close</button>
          <button onclick="downloadFile()">⬇ Download</button>
        </div>
      </div>
    </div>

    <div id="right">
      <div id="browser">
        <div id="browser-header">
          <button onclick="navigateUp()" style="padding:4px 10px;">⬆</button>
          <button onclick="loadFolder('/DCIM')" style="padding:4px 10px;">🏠</button>
          <span id="browser-path">/DCIM</span>
        </div>
        <div id="file-list">Click "File Browser" to browse camera files</div>
      </div>
    </div>
  </div>

  <canvas id="canvas"></canvas>

  <script>
    const video      = document.getElementById('video');
    const canvas     = document.getElementById('canvas');
    const status     = document.getElementById('status');
    const browseBtn  = document.getElementById('browseBtn');
    const CAM_PROXY  = '/cam';
    let hls = null;
    let browserOpen  = false;
    let currentPath  = '/DCIM';
    let currentFile  = null; // { href, name, type }

    function initStream() {
      if (hls) { hls.destroy(); hls = null; }
      closeViewer();
      status.textContent = 'Starting stream...';
      const m3u8Url = `http://${location.host}/stream.m3u8?_=${Date.now()}`;
      if (Hls.isSupported()) {
        hls = new Hls({ startLevel: -1, debug: false });
        hls.loadSource(m3u8Url);
        hls.attachMedia(video);
        hls.on(Hls.Events.MANIFEST_PARSED, () => { video.play().catch(()=>{}); status.textContent = 'Live streaming'; });
        hls.on(Hls.Events.ERROR, (e, d) => { if (d.fatal) status.textContent = 'Stream error: ' + d.type; });
      } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
        video.src = m3u8Url; video.play().catch(()=>{}); status.textContent = 'Live streaming (native HLS)';
      } else { status.textContent = 'HLS not supported'; }
    }

    function takeSnapshot() {
      if (!video.src && !video.currentSrc) { alert('Not connected!'); return; }
      canvas.width = video.videoWidth || 1920; canvas.height = video.videoHeight || 1080;
      canvas.getContext('2d').drawImage(video, 0, 0);
      canvas.toBlob(blob => { const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = 'snapshot-' + Date.now() + '.jpg'; a.click(); });
    }

    function toggleBrowser() {
      browserOpen = !browserOpen;
      browseBtn.classList.toggle('active', browserOpen);
      document.getElementById('browser').style.display = browserOpen ? 'block' : 'none';
      if (browserOpen) loadFolder(currentPath);
    }

    async function loadFolder(path) {
      const list  = document.getElementById('file-list');
      const pathEl = document.getElementById('browser-path');
      currentPath = path;
      pathEl.textContent = path || '/';
      list.innerHTML = '<div style="color:#888;padding:10px;font-size:0.85rem">Loading...</div>';
      try {
        const r    = await fetch(CAM_PROXY + path);
        const html = await r.text();
        const rows = parseFileList(html, path);
        if (rows.length === 0) {
          list.innerHTML = '<div style="color:#888;padding:10px;font-size:0.85rem">Empty or inaccessible</div>';
          return;
        }
        list.innerHTML = rows.map(row =>
          `<div class="file-row ${row.type}" ${row.type === 'folder' ? `onclick="loadFolder('${row.href}')"` : `onclick="openFile('${row.href}','${row.name}','${row.type}')"`}>
            <span class="fname">${row.type === 'folder' ? '📁 ' : '🎬 '}${row.name}</span>
            <span class="fsize">${row.size}</span>
            <span class="ftime">${row.time}</span>
           </div>`
        ).join('');
      } catch(e) {
        list.innerHTML = `<div style="color:#f55;padding:10px;font-size:0.85rem">Error: ${e.message}<br><small>Check dashcam WiFi connection</small></div>`;
      }
    }

    function parseFileList(html, basePath) {
      const rows = [];
      for (const raw of html.split('<tr>')) {
        if (!raw || !raw.includes('<a href=')) continue;
        const hrefM = raw.match(/<a href="([^"]+)"><b>([^<]+)<\/b><\/a>/);
        if (!hrefM) continue;
        const href = hrefM[1];
        const name = hrefM[2];
        const vals = [...raw.matchAll(/>([^<]+)</g)].map(m => m[1].trim());
        const isFolder = vals.length >= 2 && vals[1] === 'folder';
        const size = vals[1] || '';
        const time = vals[2] || '';
        rows.push({ type: isFolder ? 'folder' : 'file', name, href, size, time });
      }
      return rows;
    }

    function navigateUp() {
      if (!currentPath || currentPath === '/') return;
      const parts = currentPath.split('/').filter(Boolean);
      parts.pop();
      loadFolder('/' + parts.join('/'));
    }

    function openFile(href, name, type) {
      currentFile = { href, name, type };
      const viewerMedia = document.getElementById('viewer-media');
      const viewerName  = document.getElementById('viewer-name');
      const viewer      = document.getElementById('viewer');
      viewer.style.display = 'block';
      viewerName.textContent = name;

      if (type === 'photo' || name.match(/\.(jpg|jpeg|png)$/i)) {
        // Image — load into <img>
        viewerMedia.innerHTML = `<img src="${CAM_PROXY}${href}" style="max-height:70vh;margin:0 auto;display:block;">`;
      } else {
        // Video — load into <video> with controls
        viewerMedia.innerHTML = `<video src="${CAM_PROXY}${href}" controls playsinline style="max-height:70vh;width:100%;"></video>`;
      }
    }

    function closeViewer() {
      document.getElementById('viewer').style.display = 'none';
      document.getElementById('viewer-media').innerHTML = '';
      currentFile = null;
    }

    function downloadFile() {
      if (!currentFile) return;
      const a = document.createElement('a');
      a.href = CAM_PROXY + currentFile.href;
      a.download = currentFile.name;
      a.target = '_blank';
      a.click();
    }
  </script>
</body>
</html>
