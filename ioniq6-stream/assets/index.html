<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>IONIQ6 Dashcam</title>
  <script src="https://cdn.jsdelivr.net/npm/hls.js@1.5.7"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #0d0d0d; color: #fff; font-family: 'Segoe UI', system-ui, sans-serif; display: flex; flex-direction: column; align-items: center; padding: 16px; }
    h1 { font-size: 1.2rem; margin-bottom: 12px; color: #4fc3f7; }

    #app { display: flex; gap: 14px; width: 100%; max-width: 1300px; }

    #tabs { display: flex; flex-direction: column; gap: 4px; width: 140px; flex-shrink: 0; padding-top: 4px; }
    .tab-btn {
      background: #1a1a1a; color: #888; border: none; padding: 10px 14px;
      border-radius: 8px; cursor: pointer; font-size: 0.9rem; text-align: left;
      transition: background 0.15s, color 0.15s;
    }
    .tab-btn:hover { background: #252525; color: #ccc; }
    .tab-btn.active { background: #4fc3f7; color: #000; font-weight: 600; }

    #content { flex: 1; min-width: 0; }

    .panel { display: none; }
    .panel.active { display: block; }

    #video { border: 1px solid #333; border-radius: 8px; width: 100%; background: #000; aspect-ratio: 16/9; display: block; }
    #controls { margin-top: 10px; display: flex; gap: 8px; flex-wrap: wrap; justify-content: center; }
    button { background: #4fc3f7; color: #000; border: none; padding: 7px 14px; border-radius: 6px; cursor: pointer; font-size: 0.85rem; }
    button:hover { background: #81d4fa; }
    button.snapshot { background: #ff8a65; }
    button.snapshot:hover { background: #ffab91; }
    #status { margin-top: 8px; font-size: 0.8rem; color: #777; }
    #canvas { display: none; }

    /* File browser */
    #browser { background: #111; border-radius: 8px; overflow: hidden; flex-shrink: 0; }
    #browser-header { display: flex; align-items: center; gap: 6px; padding: 9px; background: #1a1a1a; flex-wrap: wrap; }
    #browser-path { color: #aaa; font-size: 0.8rem; font-family: monospace; flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    #file-list { max-height: calc(100vh - 200px); overflow-y: auto; padding: 6px; }
    .file-row { display: flex; flex-direction: column; gap: 2px; padding: 7px 8px; border-radius: 4px; cursor: pointer; }
    .file-row:hover { background: #222; }
    .file-row.folder { color: #4fc3f7; }
    .file-row .fname { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; font-size: 0.85rem; }
    .file-row .meta { display: flex; gap: 8px; font-size: 0.72rem; color: #666; }
    .file-row .fsize { white-space: nowrap; }
    .file-row .ftime { white-space: nowrap; }

    /* Viewer */
    #viewer { flex: 1; border: 1px solid #333; border-radius: 8px; overflow: hidden; display: none; background: #000; min-height: 400px; }
    #viewer-media { display: flex; align-items: center; justify-content: center; height: calc(100vh - 230px); }
    #viewer-media img, #viewer-media video { max-width: 100%; max-height: 100%; object-fit: contain; display: block; }
    #viewer-name { padding: 7px 10px; font-size: 0.78rem; color: #888; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; background: #111; }
    #viewer-controls { padding: 8px; background: #1a1a1a; display: flex; gap: 8px; justify-content: center; }
    .btn-sm { padding: 5px 12px; font-size: 0.8rem; }

    /* Browse layout: 30/70 split */
    #browse-split { display: flex; gap: 14px; height: calc(100vh - 180px); }
    #browse-split > * { overflow: hidden; }
  </style>
</head>
<body>
  <h1>🚗 IONIQ6 Dashcam — VIOFO A139 PRO</h1>

  <div id="app">
    <div id="tabs">
      <button class="tab-btn active" id="tab-stream" onclick="showTab('stream')">📹 Live Stream</button>
      <button class="tab-btn" id="tab-browse" onclick="showTab('browse')">📁 Browse Files</button>
    </div>

    <div id="content">
      <!-- Live Stream Panel -->
      <div id="panel-stream" class="panel active">
        <video id="video" autoplay playsinline controls></video>
        <div id="controls">
          <button onclick="initStream()">▶ Connect</button>
          <button onclick="takeSnapshot()">📸 Snapshot</button>
        </div>
        <div id="status">Click Connect to start streaming</div>
        <canvas id="canvas"></canvas>
      </div>

      <!-- Browse / Management Panel -->
      <div id="panel-browse" class="panel">
        <div id="browse-split">
          <div id="browser" style="width: 30%;">
            <div id="browser-header">
              <button class="btn-sm" onclick="navigateUp()">⬆</button>
              <button class="btn-sm" onclick="loadFolder('/DCIM')">🏠</button>
              <span id="browser-path">/DCIM</span>
            </div>
            <div id="file-list">Click "Browse Files" tab to load</div>
          </div>

          <div id="viewer">
            <div id="viewer-media"></div>
            <div id="viewer-name"></div>
            <div id="viewer-controls">
              <button class="btn-sm" onclick="closeViewer()">✕ Close</button>
              <button class="btn-sm" onclick="downloadFile()">⬇ Download</button>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script>
    const video     = document.getElementById('video');
    const canvas    = document.getElementById('canvas');
    const status    = document.getElementById('status');
    const CAM_PROXY = '/cam';
    let hls = null;
    let currentPath = '/DCIM';
    let currentFile = null;

    function showTab(name) {
      document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
      document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
      document.getElementById('tab-' + name).classList.add('active');
      document.getElementById('panel-' + name).classList.add('active');
      if (name === 'browse') loadFolder(currentPath);
    }

    function initStream() {
      if (hls) { hls.destroy(); hls = null; }
      status.textContent = 'Starting stream...';
      const m3u8Url = `http://${location.host}/stream.m3u8?_=${Date.now()}`;
      if (Hls.isSupported()) {
        hls = new Hls({ startLevel: -1, debug: false });
        hls.loadSource(m3u8Url);
        hls.attachMedia(video);
        hls.on(Hls.Events.MANIFEST_PARSED, () => { video.play().catch(()=>{}); status.textContent = 'Live streaming'; });
        hls.on(Hls.Events.ERROR, (e, d) => { if (d.fatal) status.textContent = 'Stream error: ' + d.type; });
      } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
        video.src = m3u8Url; video.play().catch(()=>{}); status.textContent = 'Live streaming (native HLS)';
      } else { status.textContent = 'HLS not supported'; }
    }

    function takeSnapshot() {
      if (!video.src && !video.currentSrc) { alert('Connect to stream first!'); return; }
      canvas.width = video.videoWidth || 1920; canvas.height = video.videoHeight || 1080;
      canvas.getContext('2d').drawImage(video, 0, 0);
      canvas.toBlob(blob => { const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = 'snapshot-' + Date.now() + '.jpg'; a.click(); });
    }

    async function loadFolder(path) {
      const list  = document.getElementById('file-list');
      const pathEl = document.getElementById('browser-path');
      currentPath = path;
      pathEl.textContent = path || '/';
      list.innerHTML = '<div style="color:#888;padding:14px;font-size:0.85rem">Loading...</div>';
      try {
        const r    = await fetch(CAM_PROXY + path);
        const html = await r.text();
        const rows = parseFileList(html, path);
        if (!rows.length) {
          list.innerHTML = '<div style="color:#888;padding:14px;font-size:0.85rem">Empty or inaccessible</div>';
          return;
        }
        list.innerHTML = rows.map(row =>
          `<div class="file-row ${row.type}" ${row.type === 'folder' ? `onclick="loadFolder('${row.href}')"` : `onclick="openFile('${row.href}','${row.name}','${row.type}')"`}>
            <span class="fname">${row.type === 'folder' ? '📁 ' : '🎬 '}${row.name}</span>
            <span class="fsize">${row.size}</span>
            <span class="ftime">${row.time}</span>
           </div>`
        ).join('');
      } catch(e) {
        list.innerHTML = `<div style="color:#f55;padding:14px;font-size:0.85rem">Error: ${e.message}<br><small>Check dashcam WiFi connection</small></div>`;
      }
    }

    function parseFileList(html, basePath) {
      const rows = [];
      for (const raw of html.split('<tr>')) {
        if (!raw || !raw.includes('<a href=')) continue;
        const hrefM = raw.match(/<a href="([^"]+)"><b>([^<]+)<\/b><\/a>/);
        if (!hrefM) continue;
        const name = hrefM[2];
        const vals = [...raw.matchAll(/>([^<]+)</g)].map(m => m[1].trim());
        const isFolder = vals.length >= 2 && vals[1] === 'folder';
        rows.push({ type: isFolder ? 'folder' : 'file', name, href: hrefM[1], size: vals[1] || '', time: vals[2] || '' });
      }
      return rows;
    }

    function navigateUp() {
      if (!currentPath || currentPath === '/') return;
      const parts = currentPath.split('/').filter(Boolean);
      parts.pop();
      loadFolder('/' + parts.join('/'));
    }

    function openFile(href, name, type) {
      currentFile = { href, name, type };
      const vm = document.getElementById('viewer-media');
      const vn = document.getElementById('viewer-name');
      const v  = document.getElementById('viewer');
      v.style.display = 'flex';
      v.style.flexDirection = 'column';
      vn.textContent = (type === 'photo' ? '📷 ' : '🎬 ') + name;

      if (type === 'photo' || name.match(/\.(jpg|jpeg|png)$/i)) {
        vm.innerHTML = `<img src="${CAM_PROXY}${href}" alt="${name}">`;
      } else {
        vm.innerHTML = `<video src="${CAM_PROXY}${href}" controls playsinline></video>`;
      }
    }

    function closeViewer() {
      document.getElementById('viewer').style.display = 'none';
      document.getElementById('viewer-media').innerHTML = '';
      currentFile = null;
    }

    function downloadFile() {
      if (!currentFile) return;
      const a = document.createElement('a');
      a.href    = CAM_PROXY + currentFile.href;
      a.download = currentFile.name;
      a.target  = '_blank';
      a.click();
    }
  </script>
</body>
</html>
